name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (electron-vite)
        run: npm run build

      - name: Package and publish (electron-builder)
        env:
          # GH_TOKEN is what electron-builder reads to publish a draft release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Don't try to sign macOS / Windows builds — we ship unsigned for now.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --publish always

      - name: Upload artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-dist
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: ignore
          retention-days: 7
