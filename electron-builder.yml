appId: io.github.takanarishimbo.whisperanywhere
productName: WhisperAnywhere
asar: true

directories:
  output: release
  buildResources: build

# What goes into the final app bundle. electron-vite outputs to `out/`.
# Dev dependencies are excluded automatically; runtime `dependencies` from
# package.json (currently: ws, zustand, react, react-dom) are kept.
files:
  - out/**/*
  - package.json
  - "!**/node_modules/**/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/**/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/**/*.d.ts"
  - "!**/node_modules/**/.bin"

linux:
  target:
    - AppImage
    - deb
  category: AudioVideo
  maintainer: takanari.shimbo@gmail.com
  synopsis: ホットキーで音声を入力し、リアルタイム文字起こしを今フォーカス中のアプリへ自動貼り付け。
  # IMPORTANT: keep this on a SINGLE line. electron-builder copies this value
  # verbatim into the generated .desktop file's Comment field, and any newline
  # makes desktop-file-utils refuse to parse the file (so the app disappears
  # from GNOME Activities / Ubuntu app search).
  description: ホットキーひとつで録音 → OpenAI Realtime API でリアルタイム文字起こし → 結果を今フォーカス中のアプリの入力欄へ自動貼り付け。メール、チャット、ブラウザ、エディタなど、どこからでも声で入力できます。
  desktop:
    entry:
      StartupWMClass: WhisperAnywhere
      # Override Comment so GNOME shows a short ASCII default that any locale
      # can read, with a Japanese localisation for ja_* locales.
      Comment: Voice input for any app via a global hotkey.
      Comment[ja]: ホットキーで音声入力 → リアルタイム文字起こし → フォーカス中のアプリへ自動貼り付け。

deb:
  # xdotool is required for the auto-paste step on X11.
  depends:
    - xdotool

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.utilities
  hardenedRuntime: true
  gatekeeperAssess: false
  extendInfo:
    NSMicrophoneUsageDescription: WhisperAnywhere uses your microphone to transcribe speech for hands-free text input.

win:
  target:
    - target: nsis
      arch: [x64]
  # icon.ico under build/ is picked up automatically.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  releaseType: draft
